name: Install Rust
description: Install Rust and tools
branding:
  icon: package
  color: orange

inputs:
  version:
    description: "Rust toolchain version to install"
    default: "stable"
  components:
    description: "Rust components to install"
    default: ""
  tools:
    description: "Additional Rust tools to install"
    default: ""
  token:
    description: "A Github PAT"
    required: false
  targets:
    description: Comma-separated list of target triples to install for this toolchain
    required: false
  workspaces:
    description: Newline-separated list of workspaces (not yet passed through to rust-cache)
    required: false
  rust-cache:
    description: Whether to enable Rust dependency caching via Swatinem/rust-cache
    default: "true"
  sccache:
    description: Whether to enable sccache for Rust compilation caching
    default: "false"
  make-default:
    description: Whether to make the installed toolchain the default
    default: "true"

runs:
  using: composite
  steps:
    - name: Set up environment
      shell: bash
      run: echo "RUST_BACKTRACE=full" >> "$GITHUB_ENV"

    - name: Install Rust
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        COMPONENTS: ${{ inputs.components }}
        TARGETS: ${{ inputs.targets }}
        MAKE_DEFAULT: ${{ inputs.make-default }}
      run: |
        rustup toolchain install "$VERSION" --profile minimal
        # Trim whitespace, since composite expressions may yield spaces.
        COMPONENTS="$(echo "$COMPONENTS" | xargs)"
        TARGETS="$(echo "$TARGETS" | tr ',' ' ' | xargs)"
        if [ -n "$COMPONENTS" ]; then
          # shellcheck disable=SC2086
          rustup component add --toolchain "$VERSION" $COMPONENTS
        fi
        if [ -n "$TARGETS" ]; then
          for target in $TARGETS; do
            rustup target add --toolchain "$VERSION" "$target"
          done
        fi
        if [ "$MAKE_DEFAULT" = "true" ]; then rustup default "$VERSION"; fi

    - name: Use sccache
      # Prevent double-installation if the action is invoked multiple times in
      # the same workflow (e.g. when both rust and nss actions enable sccache).
      if: ${{ inputs.sccache == 'true' && env.SCCACHE_ENABLED != '1' }}
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

    - name: Enable sccache
      if: ${{ inputs.sccache == 'true' }}
      shell: bash
      run: |
        {
          echo "SCCACHE_ENABLED=1"
          echo "RUSTC_WRAPPER=sccache"
          echo "SCCACHE_GHA_ENABLED=true"
        } >> "$GITHUB_ENV"

    # Minimizes cache pressure via shared-key (one entry per OS × toolchain).
    # Only saves on main to avoid PR cache churn. Nightly is excluded since it
    # changes too frequently to benefit from caching.
    # Disabled automatically when sccache is active, since they serve the same purpose.
    - name: Enable Rust cache
      if: ${{ inputs.rust-cache == 'true' && inputs.sccache != 'true' }}
      uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
      with:
        cache-bin: false # Binaries are installed via binstall and don't benefit from caching
        cache-all-crates: false
        # TODO: pass workspaces input once we understand the interaction with empty values
        shared-key: ${{ runner.os }}-${{ inputs.version }}
        save-if: ${{ inputs.version != 'nightly' && (github.ref == format('refs/heads/{0}', github.event.repository.default_branch) || github.event.merge_group.base_ref == format('refs/heads/{0}', github.event.repository.default_branch)) }}

    - name: Set up MSVC (Windows)
      if: ${{ runner.os == 'Windows' }}
      uses: ilammy/msvc-dev-cmd@v1 # zizmor: ignore[unpinned-uses]
      # TODO: Would like to pin this, but the Mozilla org allowlist requires "ilammy/msvc-dev-cmd@v1*"
      # uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

    # See https://github.com/ilammy/msvc-dev-cmd#name-conflicts-with-shell-bash
    - name: Set up build environment (Windows)
      shell: bash
      if: ${{ runner.os == 'Windows' }}
      run: rm /usr/bin/link.exe || true

    # Use cargo-binstall for faster tool installation via pre-built binaries,
    # with fallback to cargo install.
    - name: Install Rust tools
      shell: bash
      if: ${{ inputs.tools != '' }}
      env:
        GITHUB_TOKEN: ${{ inputs.token }}
        TOOLS: ${{ inputs.tools }}
      run: |
        # renovate: depName=cargo-bins/cargo-binstall datasource=github-tags
        BINSTALL_VERSION=1.20.0
        BINSTALL_SHA=30b5ca8b54e1dcffd9548bc87ede1531310fdc67
        curl -L --proto '=https' --tlsv1.2 -sSf \
          "https://raw.githubusercontent.com/cargo-bins/cargo-binstall/${BINSTALL_SHA}/install-from-binstall-release.sh" \
          | BINSTALL_VERSION="$BINSTALL_VERSION" bash

        for tool in $(echo $TOOLS | tr "," " "); do
          cargo binstall --no-confirm "$tool" || cargo install --locked "$tool"
        done
