name: Check semver
description: Check semver requirements of a Rust crate
branding:
  icon: git-merge
  color: orange

inputs:
  package:
    description: Package to check semver for (empty = all packages)
    default: ""
  base-ref:
    description: Full git ref to compare against (e.g., origin/main). Defaults to the PR base or default branch.
    default: ""

runs:
  using: composite
  steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      with:
        persist-credentials: false
        fetch-depth: 0
        path: "semver"

    - uses: mozilla/actions/rust@v1 # zizmor: ignore[unpinned-uses] - self-reference, no supply-chain risk
      with:
        tools: cargo-semver-checks
        token: ${{ github.token }}

    - name: Check semver
      shell: bash
      working-directory: semver
      env:
        PACKAGE: ${{ inputs.package }}
        BASE_REF: ${{ inputs.base-ref || format('origin/{0}', github.event.pull_request.base.ref || github.event.repository.default_branch) }}
      run: |
        PACKAGE_ARG=""
        [ -n "$PACKAGE" ] && PACKAGE_ARG="-p $PACKAGE"
        # shellcheck disable=SC2086
        cargo semver-checks --default-features --baseline-rev "$BASE_REF" $PACKAGE_ARG
