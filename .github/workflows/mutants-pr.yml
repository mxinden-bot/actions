name: Find PR mutants
on: # zizmor: ignore[concurrency-limits] - concurrency is the caller's responsibility
  workflow_call:
    inputs:
      args:
        description: Additional arguments to pass to cargo-mutants
        default: ""
        type: string
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mutants:
    name: Find PR mutants
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: mozilla/actions/rust@v1 # zizmor: ignore[unpinned-uses] - self-reference, no supply-chain risk
        with:
          version: nightly
          tools: cargo-mutants
          token: ${{ github.token }}

      - name: Generate diff
        env:
          BASE_REF: ${{ github.base_ref || github.event.merge_group.base_ref }}
        run: |
          BASE_REF="${BASE_REF#refs/heads/}"
          git diff "origin/${BASE_REF}.." > pr.diff

      - name: Find mutants
        env:
          EXTRA_ARGS: ${{ inputs.args }}
        run: |
          MUTANTS_ARGS="--no-shuffle --in-place -- --all-targets --locked"
          # Exit codes: 0=success, 1=build/test failure (fail workflow),
          # 2=missed, 3=timeout, 4=unviable (suppress, report in summary).
          # shellcheck disable=SC2086
          (cargo mutants --in-diff pr.diff $MUTANTS_ARGS $EXTRA_ARGS 2>&1 \
            || { ec=$?; [ $ec -ge 2 ] && [ $ec -le 4 ] && exit 0; exit $ec; }) | tee results.txt

      - name: Post step summary
        if: always()
        run: |
          {
            echo "### Incremental Mutants"
            echo "Mutants found in files changed by this PR."
            echo "See https://mutants.rs/using-results.html for more information."
            echo '```'
            sed 's/\x1b\[[0-9;]*[mGKHF]//g' results.txt || true
            echo '```'
          } > "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutants.out
          path: mutants.out
