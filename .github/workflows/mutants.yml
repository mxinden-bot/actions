name: Find mutants
on: # zizmor: ignore[concurrency-limits] - concurrency is the caller's responsibility
  workflow_call:
    inputs:
      args:
        description: Additional arguments to pass to cargo-mutants
        default: ""
        type: string
      shards:
        description: Number of shards to split mutation testing across
        default: 64
        type: number
  workflow_dispatch:

permissions:
  contents: read

jobs:
  baseline:
    name: Baseline test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    outputs:
      timeout: ${{ steps.baseline.outputs.timeout }}
      shards: ${{ steps.baseline.outputs.shards }}
      max_shard: ${{ steps.baseline.outputs.max_shard }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: mozilla/actions/rust@v1 # zizmor: ignore[unpinned-uses] - self-reference, no supply-chain risk
        with:
          version: nightly
          token: ${{ github.token }}

      - name: Run baseline test
        id: baseline
        env:
          SHARDS: ${{ inputs.shards || 64 }}
        run: |
          SECONDS=0
          cargo test --locked --all-targets
          {
            echo "timeout=$(( SECONDS * 3 < 30 ? 30 : SECONDS * 3 > 90 ? 90 : SECONDS * 3 ))"
            echo "shards=$(jq -nc '[$ARGS.positional[] | tonumber]' --args $(seq 0 $((SHARDS - 1))))"
            echo "max_shard=$((SHARDS - 1))"
          } >> "$GITHUB_OUTPUT"

  mutants:
    name: Find mutants (shard ${{ matrix.shard }}/${{ needs.baseline.outputs.max_shard }})
    needs: baseline
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        shard: ${{ fromJSON(needs.baseline.outputs.shards) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: mozilla/actions/rust@v1 # zizmor: ignore[unpinned-uses] - self-reference, no supply-chain risk
        with:
          version: nightly
          tools: cargo-mutants
          token: ${{ github.token }}

      - name: Find mutants
        env:
          SHARD: ${{ matrix.shard }}/${{ strategy.job-total }}
          TIMEOUT: ${{ needs.baseline.outputs.timeout }}
          EXTRA_ARGS: ${{ inputs.args }}
        run: |
          MUTANTS_ARGS="--no-shuffle --in-place --baseline=skip -- --all-targets --locked"
          # Exit codes: 0=success, 1=build/test failure (fail workflow),
          # 2=missed, 3=timeout, 4=unviable (suppress, report in summary).
          # shellcheck disable=SC2086
          (cargo mutants --shard "$SHARD" --sharding round-robin --timeout "$TIMEOUT" $MUTANTS_ARGS $EXTRA_ARGS 2>&1 \
            || { ec=$?; [ $ec -ge 2 ] && [ $ec -le 4 ] && exit 0; exit $ec; }) | tee results.txt

      - name: Stage shard output
        if: always()
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          mkdir -p "staged/$SHARD"
          if [ -d mutants.out ]; then cp -r mutants.out/. "staged/$SHARD/"; fi

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: mutants.out-${{ matrix.shard }}
          path: staged
          retention-days: 1

  results:
    name: Results
    if: ${{ !cancelled() }}
    needs: mutants
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: mutants.out-*
          path: shards
          merge-multiple: true

      - name: Merge shard results
        run: |
          mkdir -p mutants.out
          for category in caught missed timeout unviable; do
            cat shards/*/"$category.txt" 2>/dev/null | sort -u > "mutants.out/$category.txt" || true
          done

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        id: upload
        with:
          name: mutants.out
          path: mutants.out
          compression-level: 9

      - name: Post step summary
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        run: |
          {
            echo "## Mutation Testing Results"
            echo "| Category | Count |"
            echo "|----------|------:|"
            for category in caught missed timeout unviable; do
              count=$(wc -l < "mutants.out/$category.txt" 2>/dev/null | tr -d ' ' || echo 0)
              echo "| $category | $count |"
            done
            echo ""
            for category in missed timeout; do
              if [ -s "mutants.out/$category.txt" ]; then
                echo "### Files with most $category mutants"
                echo '```'
                cut -d: -f1 "mutants.out/$category.txt" | sort | uniq -c | sort -rn | head -10
                echo '```'
              fi
            done
            echo ""
            echo "[Download full results]($ARTIFACT_URL)"
          } >> "$GITHUB_STEP_SUMMARY"
