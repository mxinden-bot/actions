name: Machete
on: # zizmor: ignore[concurrency-limits] - concurrency is the caller's responsibility
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  machete:
    name: Check for unused dependencies
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: mozilla/actions/rust@v1 # zizmor: ignore[unpinned-uses] - self-reference, no supply-chain risk
        with:
          tools: cargo-hack,cargo-machete
          token: ${{ github.token }}

      - name: Check for unused dependencies
        run: |
          # --with-metadata has false positives, see https://github.com/bnjbvr/cargo-machete/issues/127
          cargo machete --with-metadata
          cargo hack --workspace --no-manifest-path machete --with-metadata
