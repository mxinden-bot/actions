name: Test Actions
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  actionlint:
    uses: ./.github/workflows/actionlint.yml
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/dependency-review.yml

  test-rust:
    name: Test Rust action
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, windows-2025]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./rust
        with:
          version: stable
          tools: cargo-nextest
          token: ${{ github.token }}
          rust-cache: false

      - name: Verify installation
        run: |
          cargo --version
          rustc --version
          cargo nextest --version

  test-toolchains:
    name: Test toolchains action
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    # cargo is pre-installed on GitHub-hosted Ubuntu runners
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./toolchains
        id: toolchains
        with:
          working-directory: test-crate

      - name: Verify output
        env:
          TOOLCHAINS: ${{ steps.toolchains.outputs.toolchains }}
        run: |
          echo "Toolchains: $TOOLCHAINS"
          python3 -c "
          import os, json
          data = json.loads(os.environ['TOOLCHAINS'])
          assert len(data) == 3, f'Expected 3 toolchains, got {data}'
          assert '1.70.0' in data, f'Expected MSRV 1.70.0 in {data}'
          assert 'stable' in data, f'Expected stable in {data}'
          assert 'nightly' in data, f'Expected nightly in {data}'
          print('OK:', data)
          "

  test-nss:
    name: Test NSS action
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - macos-15
          - macos-15-intel
          - windows-2022
          - windows-2025
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: ./nss
        with:
          minimum-version: "3.90"
          cache: false

      - name: Verify NSS is available
        run: |
          if [ -n "$NSS_DIR" ]; then
            echo "NSS_DIR=$NSS_DIR (built from source)"
          else
            pkg-config --modversion nss
            echo "Using system NSS: $(pkg-config --modversion nss)"
          fi

  clippy:
    uses: ./.github/workflows/clippy.yml

  rustfmt:
    uses: ./.github/workflows/rustfmt.yml

  deny:
    uses: ./.github/workflows/deny.yml

  machete:
    uses: ./.github/workflows/machete.yml

  sanitize:
    uses: ./.github/workflows/sanitize.yml

  crap:
    uses: ./.github/workflows/crap.yml
    permissions:
      contents: read
      security-events: write # Required to upload SARIF results to GitHub
    with:
      features: hashing,encoding

  mutants:
    uses: ./.github/workflows/mutants.yml
    with:
      shards: 1
      args: "--features hashing,encoding"

  test-nss-android:
    name: Test NSS action (Android)
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-linux-android
          - arm-linux-androideabi
          - x86_64-linux-android
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: zulu
          java-version: 23

      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
        with:
          accept-android-sdk-licenses: true
          log-accepted-android-sdk-licenses: false

      - uses: ./nss
        with:
          minimum-version: "3.90"
          target: ${{ matrix.target }}
          token: ${{ github.token }}
          cache: false

      - name: Verify NSS is available for Android
        run: |
          echo "NSS_DIR=$NSS_DIR"
          ls dist/Release/lib/*.a
