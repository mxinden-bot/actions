name: Lint GitHub Actions workflows
on: # zizmor: ignore[concurrency-limits] - concurrency is the caller's responsibility
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Download actionlint
        id: get_actionlint
        env:
          # renovate: depName=rhysd/actionlint datasource=github-releases
          VERSION: "1.7.12"
          # SHA-256 from https://github.com/rhysd/actionlint/releases/download/v1.7.11/actionlint_1.7.11_checksums.txt
          SHA256: "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8"
        run: |
          archive="actionlint_${VERSION}_linux_amd64.tar.gz"
          curl --proto '=https' --tlsv1.2 -sSfL \
            "https://github.com/rhysd/actionlint/releases/download/v${VERSION}/${archive}" \
            -o "${archive}"
          actual=$(sha256sum "${archive}" | cut -d' ' -f1)
          echo "sha256(${archive}): expected=${SHA256} actual=${actual}"
          [ "$actual" = "$SHA256" ] || { echo "Checksum mismatch!"; exit 1; }
          tar xzf "${archive}" actionlint
          rm "${archive}"
          echo "executable=$(pwd)/actionlint" >> "$GITHUB_OUTPUT"

      - name: Check workflow files
        env:
          ACTIONLINT: ${{ steps.get_actionlint.outputs.executable }}
        run: |
          # $err is a Go template variable, not a bash variable.
          # shellcheck disable=SC2016
          $ACTIONLINT -color \
            -format '{{range $err := .}}::error file={{$err.Filepath}},line={{$err.Line}},col={{$err.Column}}::{{$err.Message}} [{{$err.Kind}}]{{end}}'

  prettier:
    name: Prettier
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - name: Check formatting
        env:
          # renovate: depName=prettier datasource=npm
          PRETTIER_VERSION: "3.8.4"
        run: npx --yes "prettier@${PRETTIER_VERSION}" --check '**/*.yml'

  zizmor:
    name: zizmor
    timeout-minutes: 5
    runs-on: ubuntu-24.04
    permissions:
      security-events: write # Required to upload SARIF results to GitHub
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Run zizmor
        run: uvx zizmor --persona auditor --format sarif . > results.sarif
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        with:
          sarif_file: results.sarif
          category: zizmor
