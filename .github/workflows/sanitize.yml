name: Sanitize
on: # zizmor: ignore[concurrency-limits] - concurrency is the caller's responsibility
  workflow_call:
    inputs:
      features:
        description: Cargo features to enable during sanitizer testing (e.g. "ci")
        default: ""
        type: string
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  sanitize:
    name: Sanitize
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15] # No Windows support for sanitizers.
        sanitizer: [address, thread, leak] # TODO: memory
        exclude:
          - os: macos-15
            sanitizer: leak
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: mozilla/actions/rust@v1 # zizmor: ignore[unpinned-uses] - self-reference, no supply-chain risk
        with:
          version: nightly
          components: rust-src
          tools: cargo-hack
          token: ${{ github.token }}

      - name: Run tests with sanitizers
        env:
          SANITIZER: ${{ matrix.sanitizer }}
          OS: ${{ matrix.os }}
          FEATURES: ${{ inputs.features }}
          ASAN_OPTIONS: detect_leaks=1:detect_stack_use_after_return=1
        run: |
          export RUSTFLAGS="-Z sanitizer=$SANITIZER $RUSTFLAGS"
          export RUSTDOCFLAGS="-Z sanitizer=$SANITIZER -Cunsafe-allow-abi-mismatch=sanitizer"
          if [ "$OS" = "ubuntu-24.04" ]; then
            sudo apt-get install -y --no-install-recommends llvm
            TARGET="x86_64-unknown-linux-gnu"
          elif [ "$OS" = "macos-15" ]; then
            TARGET="aarch64-apple-darwin"
            # Suppress leaks in macOS system libraries unrelated to the code under test.
            {
              echo "leak:dyld4::RuntimeState"
              echo "leak:fetchInitializingClassList"
              echo "leak:lang_start_internal"
            } > suppressions.txt
            LSAN_OPTIONS="suppressions=$(pwd)/suppressions.txt"
            export LSAN_OPTIONS
          fi
          FEATURES_ARG=""
          [ -n "$FEATURES" ] && FEATURES_ARG="--features $FEATURES"
          # shellcheck disable=SC2086
          cargo test --locked -Z build-std $FEATURES_ARG --target "$TARGET"
          cargo hack --workspace test --locked -Z build-std --target "$TARGET"
