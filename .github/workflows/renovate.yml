name: Renovate
on:
  schedule:
    - cron: "0 0 * * 1" # Weekly on Monday
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  renovate:
    name: Renovate
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions: {} # PAT carries all required permissions; GITHUB_TOKEN is unused
    steps:
      - name: Run Renovate
        run: |
          docker run --rm \
            -e RENOVATE_TOKEN \
            -e RENOVATE_ALLOWED_COMMANDS \
            renovate/renovate \
            mozilla/actions
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE }} # zizmor: ignore[secrets-outside-env]
          RENOVATE_ALLOWED_COMMANDS: '["^bash nss/update-sha256\\.sh (nss|nspr) [0-9]+\\.[0-9]+(\\.[0-9]+)?$"]'
