name: Install NSS
description: Install NSS
branding:
  icon: shield
  color: purple

inputs:
  minimum-version:
    description: "Minimum required version of NSS. If not provided, reads from version-file."
    required: false
    default: ""
  version-file:
    description: "Path to file containing the minimum NSS version (relative to workspace root)"
    required: false
    default: ""
  target:
    description: "Target for cross-compilation"
    default: ""
  cache:
    description: "Whether to cache the NSS build artifacts"
    default: "true"
  sccache:
    description: Whether to enable sccache for NSS compilation caching
    default: "false"
  token:
    description: "A GitHub PAT; used to avoid rate limits when fetching build scripts"
    required: false

runs:
  using: composite
  steps:
    - name: Determine minimum NSS version
      id: min-version
      shell: bash
      env:
        MIN_VERSION_INPUT: ${{ inputs.minimum-version }}
        VERSION_FILE: ${{ inputs.version-file }}
      run: |
        if [ -n "$MIN_VERSION_INPUT" ]; then
          echo "minimum=$MIN_VERSION_INPUT" >> "$GITHUB_OUTPUT"
        elif [ -n "$VERSION_FILE" ] && [ -f "$VERSION_FILE" ]; then
          echo "minimum=$(cat "$VERSION_FILE")" >> "$GITHUB_OUTPUT"
        else
          echo "::error::Either minimum-version or version-file input must be provided (and the file must exist)."
          exit 1
        fi

    - name: Install system NSS (Linux)
      shell: bash
      if: ${{ runner.os == 'Linux' && inputs.target == '' }}
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        [ "$APT_UPDATED" ] || sudo apt-get update && echo "APT_UPDATED=1" >> "$GITHUB_ENV"
        sudo apt-get install -y --no-install-recommends libnss3-dev

    - name: Install system NSS (MacOS)
      shell: bash
      if: ${{ runner.os == 'MacOS' && inputs.target == '' }}
      run: |
        [ "$BREW_UPDATED" ] || brew update && echo "BREW_UPDATED=1" >> "$GITHUB_ENV"
        brew install nss

    - name: Check system NSS version
      id: system_nss
      env:
        MIN_VERSION: ${{ steps.min-version.outputs.minimum }}
      shell: bash
      if: ${{ runner.os != 'Windows' && inputs.target == '' }}
      run: |
        nss_version=$(pkg-config --modversion nss 2>/dev/null)
        if ! pkg-config --atleast-version "$MIN_VERSION" nss; then
          echo "System NSS needs ${MIN_VERSION}, got ${nss_version:-pkg-config error}"
          exit 0
        fi
        echo "System NSS is suitable: $nss_version"
        echo "suitable=1" >> "$GITHUB_OUTPUT"

    - name: Retrieve NSS
      id: nss
      if: ${{ !steps.system_nss.outputs.suitable }}
      shell: bash
      run: |
        # Versions and checksums are defined in nss-versions.env next to this action.
        source "$GITHUB_ACTION_PATH/nss-versions.env"
        NSS_TAG="${NSS_VERSION//./_}"
        NSS_URL="https://ftp.mozilla.org/pub/security/nss/releases/NSS_${NSS_TAG}_RTM/src/nss-${NSS_VERSION}.tar.gz"
        echo "Retrieving NSS $NSS_VERSION from $NSS_URL"
        curl -L -o nss.tar.gz "$NSS_URL"
        if command -v sha256sum &>/dev/null; then
          actual=$(sha256sum nss.tar.gz | cut -d' ' -f1)
        else
          actual=$(shasum -a 256 nss.tar.gz | cut -d' ' -f1)
        fi
        echo "sha256(nss.tar.gz): expected=$NSS_SHA256 actual=$actual"
        [ "$actual" = "$NSS_SHA256" ] || { echo "Checksum mismatch!"; exit 1; }
        tar xzf nss.tar.gz --strip-components=1
        rm nss.tar.gz
        echo "version=$NSS_VERSION" >> "$GITHUB_OUTPUT"

    - name: Retrieve NSPR
      id: nspr
      if: ${{ !steps.system_nss.outputs.suitable }}
      shell: bash
      run: |
        # Versions and checksums are defined in nss-versions.env next to this action.
        source "$GITHUB_ACTION_PATH/nss-versions.env"
        NSPR_URL="https://ftp.mozilla.org/pub/nspr/releases/v$NSPR_VERSION/src/nspr-$NSPR_VERSION.tar.gz"
        echo "Retrieving NSPR $NSPR_VERSION from $NSPR_URL"
        curl -L -o nspr.tar.gz "$NSPR_URL"
        if command -v sha256sum &>/dev/null; then
          actual=$(sha256sum nspr.tar.gz | cut -d' ' -f1)
        else
          actual=$(shasum -a 256 nspr.tar.gz | cut -d' ' -f1)
        fi
        echo "sha256(nspr.tar.gz): expected=$NSPR_SHA256 actual=$actual"
        [ "$actual" = "$NSPR_SHA256" ] || { echo "Checksum mismatch!"; exit 1; }
        tar xzf nspr.tar.gz --strip-components=1
        rm nspr.tar.gz
        echo "version=$NSPR_VERSION" >> "$GITHUB_OUTPUT"

    - name: Store Ubuntu release code name (Linux)
      id: ubuntu_release
      shell: bash
      if: ${{ runner.os == 'Linux' && !steps.system_nss.outputs.suitable }}
      run: |
        # Store Ubuntu release codename for use in cache key.
        . /etc/os-release
        echo "codename=-$UBUNTU_CODENAME" >> "$GITHUB_OUTPUT"

    # Use restore-only here so PRs don't create redundant caches. PRs restore
    # from main; only main saves new caches. This reduces churn and evictions.
    # Downside: PRs that change NSS version/build will rebuild on every CI run.
    - name: Restore NSS cache
      id: cache
      if: ${{ inputs.cache == 'true' && !steps.system_nss.outputs.suitable }}
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: dist
        key: nss-${{ inputs.target || runner.os }}${{ steps.ubuntu_release.outputs.codename }}-${{ runner.arch }}-${{ steps.nss.outputs.version }}-${{ steps.nspr.outputs.version }}

    - name: Check if build is needed
      id: check_build
      if: ${{ !steps.system_nss.outputs.suitable }}
      env:
        CACHE_HIT: ${{ steps.cache.outputs.cache-hit }}
      shell: bash
      run: |
        if [ "$CACHE_HIT" != "true" ]; then
          echo "Building NSS from source"
          echo "build_nss=1" >> "$GITHUB_OUTPUT"
        else
          echo "Using cached prebuilt NSS"
        fi

    - name: Use sccache
      # Prevent double-installation if the rust action already enabled sccache.
      if: ${{ inputs.sccache == 'true' && env.SCCACHE_ENABLED != '1' && steps.check_build.outputs.build_nss }}
      uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696 # v0.0.10

    - name: Enable sccache
      # Also triggers if the rust action already set SCCACHE_ENABLED, so that
      # both Rust and NSS builds benefit when both actions are used together.
      if: ${{ (inputs.sccache == 'true' || env.SCCACHE_ENABLED == '1') && steps.check_build.outputs.build_nss }}
      shell: bash
      env:
        RUNNER_OS: ${{ runner.os }}
      run: |
        {
          echo "SCCACHE_ENABLED=1"
          echo "SCCACHE_GHA_ENABLED=true"
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache"
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache"
        } >> "$GITHUB_ENV"
        if [ "$RUNNER_OS" != "Windows" ]; then
          echo "SCCACHE_CC=sccache cc" >> "$GITHUB_ENV"
          echo "SCCACHE_CXX=sccache c++" >> "$GITHUB_ENV"
        fi

    - name: Install build dependencies (Linux)
      shell: bash
      if: ${{ runner.os == 'Linux' && steps.check_build.outputs.build_nss }}
      env:
        DEBIAN_FRONTEND: noninteractive
      run: sudo apt-get install -y --no-install-recommends gyp ninja-build

    - name: Install build dependencies (MacOS)
      shell: bash
      if: ${{ runner.os == 'MacOS' && steps.check_build.outputs.build_nss }}
      run: |
        brew install ninja
        # renovate: depName=gyp-next datasource=pypi
        echo "gyp-next==0.22.2" > req.txt
        python3 -m pip install --break-system-packages -r req.txt

    - name: Install build dependencies (Windows)
      shell: bash
      if: ${{ runner.os == 'Windows' && steps.check_build.outputs.build_nss }}
      run: |
        # shellcheck disable=SC2028
        {
          echo C:/msys64/usr/bin
          echo C:/msys64/mingw64/bin
        } >> "$GITHUB_PATH"
        /c/msys64/usr/bin/pacman -S --noconfirm python3-pip nsinstall
        # renovate: depName=gyp-next datasource=pypi
        echo "gyp-next==0.22.2" > req.txt
        python3 -m pip install -r req.txt

    - name: Set up MSVC (Windows)
      if: ${{ runner.os == 'Windows' && steps.check_build.outputs.build_nss }}
      uses: ilammy/msvc-dev-cmd@v1 # zizmor: ignore[unpinned-uses]
      # TODO: Would like to pin this, but the Mozilla org allowlist requires "ilammy/msvc-dev-cmd@v1*"
      # uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756 # v1.13.0

    - name: Set up build environment (Windows)
      shell: bash
      if: ${{ runner.os == 'Windows' && steps.check_build.outputs.build_nss }}
      run: |
        # Work around NSS's coreconf/msvc.sh bug with MSVC 18 (VS 2026):
        # Set VSPATH so msvc.sh skips its setup branch, and configure the gyp overrides ourselves.
        if [ "${VSCMD_VER%%.*}" = "18" ]; then
          {
            echo "VSPATH=$VSINSTALLDIR"
            echo "GYP_MSVS_OVERRIDE_PATH=$VSINSTALLDIR"
            echo "GYP_MSVS_VERSION=2026"
          } >> "$GITHUB_ENV"
        fi
        # See https://github.com/ilammy/msvc-dev-cmd#name-conflicts-with-shell-bash
        rm /usr/bin/link.exe || true

    - name: Set up environment
      shell: bash
      if: ${{ !steps.system_nss.outputs.suitable }}
      env:
        NSS_DIR: ${{ github.workspace }}/nss
        RUNNER_OS: ${{ runner.os }}
        WORKSPACE: ${{ github.workspace }}
      run:
        | # zizmor: ignore[github-env] We need to write to GITHUB_PATH on Windows.
        NSS_OUT="$WORKSPACE/dist/Release"
        {
          echo "LD_LIBRARY_PATH=$NSS_OUT/lib"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$NSS_OUT/lib"
          echo "NSS_DIR=$NSS_DIR"
          echo "NSS_PREBUILT=1"
        } >> "$GITHUB_ENV"
        if [ "$RUNNER_OS" == "Windows" ]; then
          echo "$NSS_OUT/lib" >> "$GITHUB_PATH"
        fi

    - name: Build
      shell: bash
      if: ${{ steps.check_build.outputs.build_nss }}
      env:
        TARGET_PLATFORM: ${{ inputs.target }}
        RUNNER_OS: ${{ runner.os }}
      run: |
        # We want to do an optimized build for accurate CPU profiling, but
        # we also want debug symbols and frame pointers for that, which the normal optimized NSS
        # build process doesn't provide.
        [ "$RUNNER_OS" != "Windows" ] && export CFLAGS="-ggdb3 -fno-omit-frame-pointer"
        if [[ $TARGET_PLATFORM == *-android* ]]; then
          # TODO: This version must also be updated when NSS versions change,
          # as the build script references library names that may change across NSS releases.
          # renovate: depName=mozilla/application-services datasource=github-releases versioning=loose
          VERSION="v152.0"
          for file in build-nss-android.sh build-android-common.sh; do
            curl -o "$file" -sSf \
              "https://raw.githubusercontent.com/mozilla/application-services/refs/tags/$VERSION/libs/$file"
            chmod +x "$file"
          done
          # sdkmanager is provided by setup-android; ANDROID_SDK_ROOT by setup-android or the runner image.
          ANDROID_SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME}}"
          test -n "$ANDROID_SDK_ROOT" || { echo "::error::ANDROID_SDK_ROOT/ANDROID_HOME is not set; run android-actions/setup-android before this action"; exit 1; }
          command -v sdkmanager >/dev/null 2>&1 || { echo "::error::sdkmanager not found; run android-actions/setup-android before this action"; exit 1; }
          # The NDK version is owned by application-services (settings.gradle `ndkVersion`).
          NDK_VERSION=$(curl -sSf \
            "https://raw.githubusercontent.com/mozilla/application-services/refs/tags/$VERSION/settings.gradle" \
            | grep ndkVersion | grep -oE '[0-9]+\.[0-9]+\.[0-9]+' | head -1) \
            || true
          test -n "$NDK_VERSION" || { echo "::error::Failed to derive ndkVersion from application-services $VERSION settings.gradle"; exit 1; }
          echo "Installing NDK $NDK_VERSION (from application-services $VERSION)"
          sdkmanager --install "ndk;$NDK_VERSION"
          export ANDROID_NDK="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          ANDROID_NDK_VERSION=$(basename "$ANDROID_NDK" | cut -d. -f1)
          # See https://github.com/mozilla/application-services/blob/46cacda811da094653dc8e93158956f4cd57e87a/libs/build-all.sh#L89-L102
          # It figures that NSPR would require monkey-patching to build on Android.
          sed -i'' 's/if test -z "$android_ndk" ; then/$as_echo "#define ANDROID 1" >>confdefs.h\n    ;;\nunreachable)\n    if test -z "$android_ndk" ; then/g' nspr/configure
          ./build-nss-android.sh "$(pwd)" "/tmp/dist" "$ANDROID_NDK/toolchains/llvm/prebuilt/linux-x86_64" "$TARGET_PLATFORM" "$ANDROID_NDK_VERSION"
          # Manually move the temporary build directory to the final location.
          find /tmp/tmp.* > tmp
          CERTUTIL="$(grep certutil tmp)"
          TARGET_DIR="$(dirname $(dirname $CERTUTIL))"
          mkdir -p "dist/Release"
          cp -vaL "$TARGET_DIR"/* "dist/Release/"
          NSPR_H="$(grep nspr.h tmp)"
          INCLUDE_DIR="$(dirname $NSPR_H)"
          mkdir -p "dist/Release/include/nspr"
          cp -vaL "$INCLUDE_DIR"/* "dist/Release/include/nspr"
          CHACHA="$(grep chacha20poly1305.h tmp)"
          PRIVATE_DIR="$(dirname $(dirname $CHACHA))"
          mkdir -p "dist/private"
          cp -vaL "$PRIVATE_DIR"/* "dist/private/"
          UTILRENAME="$(grep utilrename.h tmp)"
          PUBLIC_DIR="$(dirname $(dirname $(dirname $UTILRENAME)))"
          mkdir -p "dist/public"
          cp -vaL "$PUBLIC_DIR"/* "dist/"
          LIBNSPR4="$(grep lib/libnspr4.a tmp)"
          LIB_DIR="$(dirname $LIBNSPR4)"
          mkdir -p "dist/Release/lib"
          cp -vaL "$LIB_DIR"/* "dist/Release/lib"
        else
          [ "$SCCACHE_CC" ] && [ "$SCCACHE_CXX" ] && export CC="$SCCACHE_CC" CXX="$SCCACHE_CXX"
          $NSS_DIR/build.sh -g -Ddisable_tests=1 -Ddisable_dbm=1 -Ddisable_libpkix=1 -Ddisable_ckbi=1 -Ddisable_fips=1 --opt --static
        fi

    - name: Save NSS cache
      if: ${{ inputs.cache == 'true' && steps.check_build.outputs.build_nss && github.event_name != 'pull_request' }}
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: dist
        key: nss-${{ inputs.target || runner.os }}${{ steps.ubuntu_release.outputs.codename }}-${{ runner.arch }}-${{ steps.nss.outputs.version }}-${{ steps.nspr.outputs.version }}
