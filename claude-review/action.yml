name: Claude Code Review
description: Runs Claude Code Review on a pull request.
branding:
  icon: eye
  color: purple

inputs:
  anthropic_api_key:
    description: Anthropic API key.
    required: true
  model:
    description: Claude model to use for the review.
    default: "claude-opus-4-8"
  fallback_model:
    description: Fallback Claude model if the primary model is unavailable.
    default: "claude-sonnet-4-6"
  budget:
    description: Maximum budget in USD for the review.
    default: "5.00"
  prompt:
    description: >
      Additional project-specific review instructions, appended after the base
      review prompt. Use this to add domain-specific focus areas (e.g., protocol
      compliance, unsafe FFI rules) relevant to your project.
    default: ""

runs:
  using: composite
  steps:
    # Read prompt before PR checkout so it comes from the action version (non-spoofable).
    - name: Read prompt
      id: prompt
      shell: bash
      env:
        ACTION_PATH: ${{ github.action_path }}
        EXTRA_PROMPT: ${{ inputs.prompt }}
        PR_NUMBER: ${{ github.event.pull_request.number || github.event.number }}
        REPOSITORY: ${{ github.repository }}
      run: |
        if [[ -z "$PR_NUMBER" ]]; then
          echo "::error::Claude Code Review must run on a pull request event, or another event that provides a pull request number."
          exit 1
        fi
        # Use a random delimiter to prevent injection via the prompt input.
        DELIM="EOF_$(head -c 8 /dev/urandom | xxd -p)"
        {
          echo "content<<$DELIM"
          # Explicitly anchor Claude to the correct PR so concurrent workflow runs
          # for different PRs cannot cross-contaminate each other's reviews.
          echo "You are reviewing pull request #${PR_NUMBER} in repository ${REPOSITORY}."
          echo "IMPORTANT: Post all review comments exclusively to pull request #${PR_NUMBER}."
          echo "You may read other pull requests for context, but do not post comments to them."
          echo ""
          cat "$ACTION_PATH/prompt.md"
          if [[ -n "$EXTRA_PROMPT" ]]; then
            echo ""
            echo "## Additional Project-Specific Review Guidelines"
            echo ""
            echo "$EXTRA_PROMPT"
          fi
          echo "$DELIM"
        } >> "$GITHUB_OUTPUT"

    # With pull_request_target, checkout defaults to the base branch.
    # Check out from the PR's head repository to handle fork PRs correctly.
    - name: Checkout PR head
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        repository: ${{ github.event.pull_request.head.repo.full_name }}
        ref: ${{ github.event.pull_request.head.sha }}
        persist-credentials: false

    - name: Restore trusted instruction files from base branch
      shell: bash
      env:
        BASE_REPO: ${{ github.repository }}
        BASE_SHA: ${{ github.event.pull_request.base.sha }}
        FETCH_TOKEN: ${{ github.token }}
      run: |
        # Write credentials into the local git config rather than the command line
        # to avoid exposure in process listings. Unset on exit so the token isn't
        # left in .git/config if the fetch fails.
        AUTH_HEADER="$(printf 'x-access-token:%s' "$FETCH_TOKEN" | base64 | tr -d '\n')"
        git config --local "http.https://github.com/.extraheader" "AUTHORIZATION: basic $AUTH_HEADER"
        trap 'git config --local --unset "http.https://github.com/.extraheader" 2>/dev/null || true' EXIT
        git fetch --depth=1 "https://github.com/$BASE_REPO" "$BASE_SHA"
        # Restore .github/copilot-instructions.md from the trusted base branch version.
        # If it doesn't exist on the base branch, remove any PR version to prevent
        # a newly added file from influencing the review.
        if git cat-file -e "FETCH_HEAD:.github/copilot-instructions.md" 2>/dev/null; then
          git checkout FETCH_HEAD -- .github/copilot-instructions.md
        else
          rm -f -- .github/copilot-instructions.md
        fi

    - name: Run Claude Code Review
      id: claude
      # TODO: Would like to pin this, but the Mozilla org allowlist requires "anthropics/claude-code-action@v1"
      uses: anthropics/claude-code-action@v1 # zizmor: ignore[unpinned-uses]
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        github_token: ${{ github.token }}
        # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
        # or https://docs.anthropic.com/en/docs/claude-code/sdk#command-line for available options
        claude_args: |
          --model ${{ inputs.model }}
          --fallback-model ${{ inputs.fallback_model }}
          --max-budget-usd ${{ inputs.budget }}
          --allowedTools "Read(file_path:${{ github.workspace }}/**)" "Glob(path:${{ github.workspace }}/**)" "Grep(path:${{ github.workspace }}/**)"
          --allowedTools "Bash(gh pr view:*)" "Bash(gh pr list:*)" "Bash(gh pr diff:*)" "Bash(gh issue view:*)" "Bash(gh issue list:*)" "Bash(gh release list:*)" "Bash(gh release view:*)" "Bash(git log:*)" "Bash(git diff:*)" "Bash(git show:*)" "Bash(git blame:*)"
          --allowedTools mcp__github_inline_comment__create_inline_comment
          --allowedTools mcp__github__create_pending_pull_request_review,mcp__github__add_comment_to_pending_review,mcp__github__submit_pending_pull_request_review,mcp__github__delete_pending_pull_request_review,mcp__github__create_and_submit_pull_request_review,mcp__github__add_reply_to_pull_request_comment
          --allowedTools mcp__github__pull_request_read,mcp__github__get_pull_request,mcp__github__get_pull_request_diff,mcp__github__get_pull_request_files,mcp__github__get_pull_request_review_comments,mcp__github__get_pull_request_reviews,mcp__github__get_pull_request_status,mcp__github__list_pull_requests,mcp__github__search_pull_requests
          --allowedTools mcp__github__get_issue,mcp__github__get_issue_comments,mcp__github__list_issues,mcp__github__search_issues,mcp__github__list_discussions,mcp__github__get_discussion,mcp__github__get_discussion_comments,mcp__github__list_discussion_categories,mcp__github__get_label,mcp__github__list_labels
          --allowedTools mcp__github__get_commit,mcp__github__list_commits,mcp__github__get_me,mcp__github__get_workflow_run,mcp__github__list_workflow_runs,mcp__github__list_workflow_jobs,mcp__github__search_code,mcp__github__search_repositories
          --allowedTools mcp__github__get_file_contents,mcp__github__get_repository_tree,mcp__github__list_branches,mcp__github__list_releases,mcp__github__get_latest_release,mcp__github__list_tags,mcp__github__get_tag
        prompt: ${{ steps.prompt.outputs.content }}

    - name: Check review outcome
      shell: bash
      env:
        CONCLUSION: ${{ steps.claude.outputs.conclusion }}
        LOG: ${{ runner.temp }}/claude-execution-output.json
      run: |
        # The action sets conclusion=failure for hard errors (is_error, non-success subtype).
        if [[ "$CONCLUSION" == "failure" ]]; then
          echo "Claude execution failed." >&2
          exit 1
        fi
        # Additionally check for permission denials, which don't affect the conclusion.
        if [[ -f "$LOG" ]]; then
          RESULT=$(jq 'map(select(.type == "result")) | last // {}' "$LOG" 2>/dev/null)
          DENIALS=$(jq -r '.permission_denials // [] | length' <<< "$RESULT" 2>/dev/null || echo 0)
          if [[ "$DENIALS" -gt 0 ]]; then
            TOOLS=$(jq -r '.permission_denials // [] | .[].tool_name' <<< "$RESULT" 2>/dev/null | sort -u | tr '\n' ',')
            echo "::warning::Claude had $DENIALS permission denial(s) — review may be incomplete. Denied tools: ${TOOLS%,}"
            echo "::group::Permission denial details"
            jq -r '.permission_denials // [] | .[] |
              if .tool_name == "Bash" then
                "  Bash: " + ((.tool_input.command // "(unknown)") | gsub("\n"; "\\n"))
              else
                "  " + .tool_name + ": " + (.tool_input | tojson)
              end' <<< "$RESULT" 2>/dev/null || true
            echo "::endgroup::"
          fi
        fi
